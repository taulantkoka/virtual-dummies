####################################
# GLOBAL PARAMETERS                #
####################################

global_parameters:
  random_seed: __SEED__
  chromosome: __CHR__
  superpopulation: EUR
  memory: 60000
  batchsize: 14000


####################################
# FILEPATHS                        #
####################################

filepaths:
  general:
    output_dir: __OUTDIR__
    output_prefix: run___RUNID___chr-{chromosome}

  genotype:
    vcf_input_raw: __DATADIR__/inputs/processed/1KG+HGDP/1KG+HGDP.chr{chromosome}.hapmap.final.recode.vcf
    vcf_input_processed: __DATADIR__/inputs/processed/1KG+HGDP/1KG+HGDP.chr{chromosome}.hapmap.final.recode.vcf
    vcf_metadata: __DATADIR__/inputs/processed/1KG+HGDP/1KG+HGDP.chr{chromosome}.metadata

    popfile_raw: __DATADIR__/inputs/processed/1KG+HGDP/merged_pop.tsv
    popfile_processed: __DATADIR__/inputs/processed/1KG+HGDP/merged_pop.tsv
    variant_list: __DATADIR__/inputs/processed/1KG+HGDP/hapmap_variant_list_chr{chromosome}.txt
    remove_list: __DATADIR__/inputs/processed/1KG+HGDP/remove.txt
    rsid_list: __DATADIR__/inputs/processed/1KG+HGDP/rsid_map_list_chr{chromosome}.txt

    genetic_mapfile: __DATADIR__/inputs/processed/1KG+HGDP/dummies/chr{chromosome}.interpolated_genetic_map
    genetic_distfile: __DATADIR__/inputs/processed/1KG+HGDP/1KG+HGDP.chr{chromosome}.hapmap.distfile

    mutation_mapfile: __DATADIR__/inputs/processed/1KG+HGDP/dummies/atlas.chr{chromosome}.csv
    mutation_agefile: __DATADIR__/inputs/processed/1KG+HGDP/1KG+HGDP.chr{chromosome}.hapmap.agefile

    hap1_matrix: __DATADIR__/inputs/processed/1KG+HGDP/1KG+HGDP.chr{chromosome}.hapmap.h1
    hap2_matrix: __DATADIR__/inputs/processed/1KG+HGDP/1KG+HGDP.chr{chromosome}.hapmap.h2

  phenotype:
    causal_list: __DATADIR__/inputs/processed/1KG+HGDP/Test.CausalList
    reference: __DATADIR__/inputs/processed/1KG+HGDP/Africa.Annot
    traw_override: __OUTDIR__/run___RUNID___chr-{chromosome}
    plink_override: __OUTDIR__/run___RUNID___chr-{chromosome}

  software:
    plink: /home/tk33sawa/tools/plink1/plink
    plink2: /home/tk33sawa/tools/plink2/plink2
    king: /home/tk33sawa/tools/king/king
    vcftools: /home/tk33sawa/tools/vcftools/bin/vcftools
    mapthin: /home/tk33sawa/tools/mapthin/mapthin
    phenoalg: /home/tk33sawa/tools/phenoalg


####################################
# GENOTYPE DATA                    #
####################################

genotype_data:
  filetype: plink
  samples:
    use_default: true
    custom:
    default:
      nsamples: 100000
  rho:
    AFR: 0.642
    AMR: 0.476
    EAS: 0.582
    EUR: 0.444
    CSA: 0.622
    MID: 0.472
  Ne:
    AFR: 22505
    AMR: 16958
    EAS: 14087
    EUR: 19097
    CSA: 18473
    MID: 15888


####################################
# PHENOTYPE DATA                   #
####################################

phenotype_data:
  nPopulation: 1
  nTrait: 1
  a: -0.4
  b: -1
  c: 0.5
  nComponent: 1
  PropotionGeno: 0.25
  PropotionCovar: 0
  Prevalence: 0.1
  TraitCorr: 1
  PopulationCorr: 0
  CompWeight: 1,5,10
  Causality:
      UseCausalList: true


####################################
# EVALUATION                       #
####################################

evaluation:
  metrics:
    aats: false
    kinship: false
    ld_corr: false
    ld_decay: false
    maf: false
    pca: false
    gwas: false


####################################
# OPTIMISATION                     #
####################################

optimisation:
  priors:
    rho:
      uniform_lower: 0
      uniform_upper: 3
    Ne:
      uniform_lower: 0
      uniform_upper: 50000
  simulation_rejection_ABC:
    run: false
    n_particles: 500
    threshold: 0.15
    max_iter: 500
    write_progress: true
  emulation_rejection_ABC:
    run: false
    n_particles: 500
    threshold: 0.15
    n_design_points: 50
    max_iter: 500
    write_progress: true
  summary_statistics:
    ld_decay: true
    kinship: true
